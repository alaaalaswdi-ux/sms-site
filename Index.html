<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح SMS</title>
    <script>
        // الحصول على الباراميترات من الرابط
        const params = new URLSearchParams(window.location.search);
        const phone = params.get('phone') || '774941010';
        const body = params.get('body') || '';
        
        // إنشاء رابط sms
        const smsLink = `sms:${phone}${body ? '?body=' + encodeURIComponent(body) : ''}`;
        
        // إعادة التوجيه فوراً
        window.location.href = smsLink;
        
        // إظهار زر احتياطي إذا لم يعمل التوجيه التلقائي
        setTimeout(() => {
            document.getElementById('manual-btn').style.display = 'block';
        }, 1000);
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            direction: rtl;
        }
        #manual-btn {
            display: none;
            margin-top: 30px;
            padding: 15px 30px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .loading {
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="loading">جاري فتح تطبيق الرسائل...</div>
    <button id="manual-btn" onclick="window.location.href='sms:' + new URLSearchParams(window.location.search).get('phone') + (new URLSearchParams(window.location.search).get('body') ? '?body=' + encodeURIComponent(new URLSearchParams(window.location.search).get('body')) : '')">
        اضغط هنا لفتح SMS
    </button>
</body>
</html>
